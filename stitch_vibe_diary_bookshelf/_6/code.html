<style>.material-symbols-outlined {

    color: #2f3430

    writing-mode: vertical-rl;
    text-orientation: mixed

.shelf-shadow {
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), inset 0 -4px 6px rgba(0, 0, 0, 0.05)

<body class="font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- TopNavBar -->
<header class="bg-[#faf9f6]/85 dark:bg-stone-900/85 backdrop-blur-xl docked full-width top-0 sticky z-50 flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<span class="text-xl font-bold text-[#695d4a] dark:text-[#d1c7b7] font-headline tracking-tight">氛围日记</span>
</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-[#695d4a] dark:text-[#f4f4f0] font-bold hover:text-[#5d513f] transition-colors duration-300 font-label text-sm" href="#">书卷</a>
<a class="text-[#695d4a]/60 dark:text-[#f4f4f0]/60 hover:text-[#5d513f] transition-colors duration-300 font-label text-sm" href="#">收藏</a>
<a class="text-[#695d4a]/60 dark:text-[#f4f4f0]/60 hover:text-[#5d513f] transition-colors duration-300 font-label text-sm" href="#">撰写</a>
<a class="text-[#695d4a]/60 dark:text-[#f4f4f0]/60 hover:text-[#5d513f] transition-colors duration-300 font-label text-sm" href="#">设置</a>
</div>
<div class="flex items-center gap-3">
<div class="relative group">
<input class="bg-surface-container-low border-none focus:ring-0 text-sm font-label rounded-full py-2 pl-4 pr-10 w-48 md:w-64 transition-all focus:w-72" placeholder="搜索往事..." type="text"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-primary/40">search</span>
</div>
<button class="p-2 text-primary/60 hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="filter_list">filter_list</span>
</button>
<button class="p-2 text-primary/60 hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<main class="flex-1 w-full bg-[#f4f1ea] dark:bg-stone-950 overflow-hidden relative">
<!-- Background Lighting and Textures -->
<div class="absolute inset-0 shelf-lighting pointer-events-none"></div>
<div class="max-w-6xl mx-auto px-6 py-12 relative z-10 h-full">
<header class="mb-16">
<span class="font-label text-xs uppercase tracking-[0.3em] text-primary/40 mb-2 block">Library of Memories</span>
<h1 class="font-headline text-5xl font-bold text-primary tracking-tighter leading-tight">时光之书</h1><div class="mt-6 flex items-center gap-4">
<a class="inline-flex items-center gap-2 group px-4 py-2 bg-primary/5 hover:bg-primary/10 rounded-full transition-all duration-300" href="#">
<span class="material-symbols-outlined text-primary/60 group-hover:text-primary text-sm">timeline</span>
<span class="font-label text-xs uppercase tracking-widest text-primary/60 group-hover:text-primary transition-colors">切换至时光轴</span>
</a>
<div class="h-4 w-[1px] bg-primary/10"></div>
<div class="flex items-center gap-2 opacity-100">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-label text-xs uppercase tracking-widest text-primary font-bold">当前：书架</span>
</div>
</div>
</header>
<!-- The Bookshelf Container -->
<div class="space-y-32">
<!-- Shelf Row 1 -->
<div class="relative">
<div class="flex items-end gap-1 px-4 mb-1">
<!-- Book: 2023 氛围日记 -->
<div class="group relative cursor-pointer transform transition-all duration-500 hover:-translate-y-4 hover:rotate-1">
<div class="w-20 h-72 linen-texture bg-[#dcd2c1] rounded-l-sm rounded-r-md book-shadow flex items-center justify-center border-l border-white/20">
<span class="book-spine font-headline text-primary text-xl font-bold tracking-tight">2023 氛围日记</span>
</div>
<div class="absolute -top-12 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap bg-white/80 backdrop-blur px-3 py-1 rounded text-[10px] font-label uppercase tracking-widest text-primary shadow-sm">Explore Chapter</div>
</div>
<!-- Book: 冬日往事 -->
<div class="group relative cursor-pointer transform transition-all duration-500 hover:-translate-y-4 hover:-rotate-1">
<div class="w-16 h-64 leather-texture bg-[#4a3f35] rounded-l-sm rounded-r-md book-shadow flex items-center justify-center border-l border-white/10">
<span class="book-spine font-headline text-[#dcd2c1] text-sm tracking-widest">冬日往事</span>
</div>
</div>
<!-- Spacer/Small gaps for realism -->
<div class="w-2"></div>
<!-- Book: 灵感集 -->
<div class="group relative cursor-pointer transform transition-all duration-500 hover:-translate-y-4 hover:rotate-2">
<div class="w-14 h-56 paper-texture bg-[#f8f5f0] rounded-l-sm rounded-r-md book-shadow flex items-center justify-center border-l border-stone-200">
<span class="book-spine font-headline text-stone-600 text-xs font-semibold tracking-tighter">灵感集</span>
</div>
</div>
<!-- Thin Journals -->
<div class="w-8 h-48 bg-[#695d4a] rounded-sm opacity-80 ml-4 border-l border-white/5"></div>
<div class="w-10 h-52 bg-[#5d513f] rounded-sm opacity-90 border-l border-white/5"></div>
</div>
<!-- Wood Shelf Base -->
<div class="h-6 w-full bg-[#e3dccb] dark:bg-stone-800 rounded-sm shelf-shadow relative">
<div class="absolute inset-0 bg-black/5 pointer-events-none"></div>
<div class="absolute top-0 left-0 right-0 h-[1px] bg-white/30"></div>
</div>
<div class="mt-4 font-label text-[10px] uppercase tracking-widest text-primary/40 pl-4">近期所辑</div>
</div>
<!-- Shelf Row 2 -->
<div class="relative max-w-4xl">
<div class="flex items-end gap-1 px-4 mb-1">
<!-- Book: 旧城漫步 -->
<div class="group relative cursor-pointer transform transition-all duration-500 hover:-translate-y-4">
<div class="w-18 h-60 linen-texture bg-[#8d8374] rounded-l-sm rounded-r-md book-shadow flex items-center justify-center border-l border-white/10">
<span class="book-spine font-headline text-white/90 text-sm tracking-widest">旧城漫步</span>
</div>
</div>
<!-- Several thin notebooks leaning -->
<div class="w-12 h-64 bg-[#c8bba8] rounded-l-sm rounded-r-md book-shadow transform -rotate-6 origin-bottom ml-6 border-l border-white/20"></div>
<div class="w-12 h-64 bg-[#b8aa95] rounded-l-sm rounded-r-md book-shadow transform -rotate-3 origin-bottom -ml-4 border-l border-white/20"></div>
<!-- Book: 寄往春天的信 -->
<div class="group relative cursor-pointer transform transition-all duration-500 hover:-translate-y-4 ml-12">
<div class="w-22 h-68 leather-texture bg-[#332b24] rounded-l-sm rounded-r-md book-shadow flex items-center justify-center border-l border-white/5">
<span class="book-spine font-headline text-[#f2e0c8] text-base font-bold tracking-tight uppercase">春日信笺</span>
</div>
</div>
</div>
<!-- Wood Shelf Base -->
<div class="h-6 w-full bg-[#e3dccb] dark:bg-stone-800 rounded-sm shelf-shadow relative">
<div class="absolute inset-0 bg-black/5"></div>
</div>
<div class="mt-4 font-label text-[10px] uppercase tracking-widest text-primary/40 pl-4">往岁尘封</div>
</div>
</div>
<!-- Library Statistics Overlay -->
<div class="mt-24 flex items-center justify-center gap-16 border-t border-primary/10 pt-12">
<div class="text-center">
<span class="block font-headline text-4xl font-bold text-primary">128</span>
<span class="font-label text-[10px] uppercase tracking-widest text-primary/40">Total Entries</span>
</div>
<div class="h-12 w-[1px] bg-primary/10"></div>
<div class="text-center">
<span class="block font-headline text-4xl font-bold text-primary">24</span>
<span class="font-label text-[10px] uppercase tracking-widest text-primary/40">Collections</span>
</div>
</div>
</div>
<!-- Floating action hint -->
<div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 opacity-40 hover:opacity-100 transition-opacity">
<span class="font-label text-[10px] uppercase tracking-[0.3em] text-primary">Scroll to explore deeper shelves</span>
<span class="material-symbols-outlined animate-bounce text-primary" data-icon="keyboard_double_arrow_down">keyboard_double_arrow_down</span>
</div>
</main>
<!-- BottomNavBar (Mobile only) -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md z-50 flex justify-around items-center py-3 px-4 bg-[#ffffff]/90 dark:bg-stone-950/90 backdrop-blur-lg rounded-full shadow-lg md:hidden">
<a class="flex flex-col items-center justify-center text-primary scale-110" href="#">
<span class="material-symbols-outlined" data-icon="auto_stories" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
<span class="font-label text-[10px] uppercase tracking-widest mt-1">书卷</span>
</a>
<a class="flex flex-col items-center justify-center text-primary/40" href="#">
<span class="material-symbols-outlined" data-icon="star">star</span>
<span class="font-label text-[10px] uppercase tracking-widest mt-1">收藏</span>
</a>
<a class="flex flex-col items-center justify-center text-primary/40" href="#">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
<span class="font-label text-[10px] uppercase tracking-widest mt-1">撰写</span>
</a>
<a class="flex flex-col items-center justify-center text-primary/40" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label text-[10px] uppercase tracking-widest mt-1">设置</span>
</a>
</nav>
</body></html>
