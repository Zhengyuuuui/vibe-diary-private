<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Newsreader:ital,wght@0,400;0,600;1,400&amp;family=Manrope:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#695d4a",
                    "on-secondary-container": "#515250",
                    "inverse-surface": "#0d0f0d",
                    "surface-container-high": "#e6e9e4",
                    "on-surface-variant": "#5c605c",
                    "on-surface": "#2f3430",
                    "on-secondary-fixed-variant": "#5b5c5a",
                    "surface-tint": "#695d4a",
                    "secondary-container": "#e3e2e0",
                    "surface-container-highest": "#e0e4de",
                    "surface-bright": "#faf9f6",
                    "on-primary-fixed": "#493e2d",
                    "surface-container-lowest": "#ffffff",
                    "secondary": "#5e5f5d",
                    "on-error-container": "#742410",
                    "error-dim": "#5c1202",
                    "on-background": "#2f3430",
                    "on-tertiary-container": "#5a5f3c",
                    "surface-container-low": "#f4f4f0",
                    "surface": "#faf9f6",
                    "on-error": "#fff7f6",
                    "inverse-primary": "#fdebd3",
                    "surface-variant": "#e0e4de",
                    "on-secondary-fixed": "#3e403e",
                    "on-primary-container": "#5c503e",
                    "inverse-on-surface": "#9d9d9a",
                    "tertiary-fixed": "#f2f7ca",
                    "outline-variant": "#afb3ae",
                    "tertiary-container": "#f2f7ca",
                    "secondary-fixed-dim": "#d5d4d2",
                    "secondary-dim": "#525351",
                    "on-tertiary": "#f8fdcf",
                    "tertiary-fixed-dim": "#e4e9bc",
                    "error-container": "#fe8b70",
                    "on-secondary": "#faf9f6",
                    "error": "#9e422c",
                    "on-primary-fixed-variant": "#665a47",
                    "tertiary": "#5d623f",
                    "on-primary": "#fff6ee",
                    "primary-container": "#f2e0c8",
                    "surface-container": "#edeeea",
                    "outline": "#777c77",
                    "tertiary-dim": "#515634",
                    "background": "#faf9f6",
                    "secondary-fixed": "#e3e2e0",
                    "primary-fixed-dim": "#e3d2bb",
                    "surface-dim": "#d6dbd5",
                    "on-tertiary-fixed-variant": "#646945",
                    "on-tertiary-fixed": "#474c2b",
                    "primary-dim": "#5d513f",
                    "primary-fixed": "#f2e0c8"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Noto Serif"],
                    "body": ["Newsreader"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .book-shadow {
            box-shadow: 0 30px 60px -12px rgba(105, 93, 74, 0.15), 
                        0 18px 36px -18px rgba(105, 93, 74, 0.2);
        }
        .focus-light {
            background: radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.8) 0%, rgba(250, 249, 246, 0) 70%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- Top Navigation Bar -->
<nav class="bg-[#faf9f6]/85 dark:bg-stone-900/85 backdrop-blur-xl font-noto-serif tracking-tight docked full-width top-0 sticky z-50 flex justify-between items-center w-full px-6 py-4">
<div class="text-xl font-bold text-[#695d4a] dark:text-[#d1c7b7]">氛围日记</div>
<div class="flex items-center gap-6">
<button class="text-[#695d4a]/60 dark:text-[#f4f4f0]/60 hover:text-[#5d513f] transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="filter_list">filter_list</span>
</button>
<button class="text-[#695d4a]/60 dark:text-[#f4f4f0]/60 hover:text-[#5d513f] transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</nav>
<!-- Main Content Stage -->
<main class="relative min-h-[calc(100vh-72px)] w-full flex flex-col items-center justify-center focus-light px-6">
<!-- Background Textural Detail (Asymmetric "Ma") -->
<div class="absolute top-20 left-12 opacity-5 pointer-events-none">
<h2 class="font-headline text-8xl leading-none vertical-rl tracking-widest">开启新篇章</h2>
</div>
<!-- The Notebook Container -->
<div class="relative group max-w-md w-full perspective-1000 mb-16">
<!-- Notebook Shadow and Glow -->
<div class="absolute inset-0 translate-y-8 blur-3xl opacity-20 bg-primary-container rounded-lg"></div>
<!-- Physical Notebook UI -->
<div class="relative aspect-[3/4] bg-primary-container rounded-r-lg rounded-l-sm book-shadow flex flex-col items-center justify-between p-12 overflow-hidden border-l-8 border-primary-dim/20">
<!-- Notebook Texture Overlay -->
<div class="absolute inset-0 opacity-10 mix-blend-overlay" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBdAG-lGHy3Is18HXGPzDUJLk2xAGaqa8ooBpB033QX7RINnkScfi7qA4bYJg_eUkukBefZunFAncoi4gdPrxF9EIgQ0LeDLexDTV6HR3BF4kIlwQTMuUUFM24b5MIw4YVFNiC2flAygaUT0DBVX8K3HvAbcaTJjx64DwvWF14eXUxc4Z7l0oh5kYDRBbxkoyyVE0i30ay_OBCIyUt_EldKaZOz29eb7YEP6_zBBzoV8JBubEvhu4MXOHVKC4PvSgW_zDRHT9HzvMc');"></div>
<!-- Label Area -->
<div class="w-full flex flex-col items-center pt-8">
<span class="font-label text-xs tracking-[0.4em] text-primary/60 mb-4 uppercase">New Collection</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 focus:ring-0 focus:border-primary text-center font-headline text-2xl placeholder:text-primary/20 text-primary transition-all duration-500 pb-2" placeholder="在此键入标题..." type="text"/>
</div>
<!-- Decorative Emblem -->
<div class="opacity-20">
<span class="material-symbols-outlined text-6xl" data-icon="ink_pen" style="font-variation-settings: 'wght' 200;">ink_pen</span>
</div>
<!-- Date/Metadata -->
<div class="w-full flex justify-between items-end border-t border-outline-variant/10 pt-4">
<div class="font-label text-[10px] tracking-widest text-primary/40 uppercase">Anno MMXXIV</div>
<div class="font-label text-[10px] tracking-widest text-primary/40 uppercase">Volume I</div>
</div>
</div>
</div>
<!-- Call to Action Section -->
<div class="flex flex-col items-center space-y-8 animate-fade-in-up">
<button class="group relative px-12 py-4 bg-primary text-on-primary rounded-md overflow-hidden transition-all duration-300 active:scale-95 shadow-lg shadow-primary/20">
<span class="relative z-10 font-headline tracking-widest text-lg">开始撰写</span>
<!-- Ink Spread Hover Effect -->
<div class="absolute inset-0 bg-primary-dim translate-y-full group-hover:translate-y-0 transition-transform duration-500 ease-out"></div>
</button>
<p class="font-body italic text-primary/60 text-sm max-w-xs text-center leading-relaxed">
                “凡事皆有起始，每一次落笔都是一场重逢。”
            </p>
</div>
<!-- Visual Anchor (Map/Location Insight) -->
<div class="absolute bottom-32 right-12 flex flex-col items-end space-y-2 opacity-40">
<span class="font-label text-[10px] tracking-widest uppercase">Location Insight</span>
<div class="w-32 h-20 rounded-xl overflow-hidden bg-surface-container-high relative">
<img alt="Minimalist abstract map slice showing a quiet city corner with soft neutral tones" class="w-full h-full object-cover grayscale opacity-60" data-location="Kyoto, Japan" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC1mYuu-WcmtZnxUOgr-KJm3zdFQCnIj4lKRwscEvKSFyXSWle8a92LCwaCax0Ilmn6awdJZj27f0nfCwPBJAaEg4Wzw78PeF1QfYYfA0sWYUNxDAnYc9UWmoPGQfWH15ovK0NHkP141O3DQhlntJv2Gubx9egpVc06a_YyQ4mSgqxoBPno1ZjjVZbQvN92cHpceuXjns_6usVoiXF5UB_GYsWxOrNPZSnmuf5bWBSf7QzFuIS_MIGmuf15g9-02q6KVe_kyDmG_a8"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-high/80 to-transparent"></div>
</div>
<span class="font-label text-[10px] tracking-widest">35.0116° N, 135.7681° E</span>
</div>
</main>
<!-- Bottom Navigation Bar (Hidden on Web) -->
<nav class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md z-50 flex justify-around items-center py-3 px-4 bg-[#ffffff]/90 dark:bg-stone-950/90 backdrop-blur-lg shadow-[0_20_40px_rgba(105,93,74,0.06)] rounded-full">
<a class="flex flex-col items-center justify-center text-[#695d4a]/40 dark:text-[#f4f4f0]/40 hover:text-[#695d4a] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
<span class="font-manrope text-[10px] uppercase tracking-widest">书卷</span>
</a>
<a class="flex flex-col items-center justify-center text-[#695d4a]/40 dark:text-[#f4f4f0]/40 hover:text-[#695d4a] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="star">star</span>
<span class="font-manrope text-[10px] uppercase tracking-widest">收藏</span>
</a>
<!-- Active Tab: Writing (Mappig to 'New Chapter' intent) -->
<a class="flex flex-col items-center justify-center text-[#695d4a] dark:text-[#f4f4f0] scale-110 active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="edit_note" style="font-variation-settings: 'FILL' 1;">edit_note</span>
<span class="font-manrope text-[10px] uppercase tracking-widest font-bold">撰写</span>
</a>
<a class="flex flex-col items-center justify-center text-[#695d4a]/40 dark:text-[#f4f4f0]/40 hover:text-[#695d4a] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="tune">tune</span>
<span class="font-manrope text-[10px] uppercase tracking-widest">设置</span>
</a>
</nav>
</body></html>
